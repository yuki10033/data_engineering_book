<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#475569"/></marker><style>.title{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;fill:#0f172a}.item{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:14px;fill:#334155}.caption{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;fill:#0f172a}</style></defs>
<rect x="1" y="1" width="1118" height="428" rx="18" fill="white" stroke="#cbd5e1"/>
<text x="560" y="38" text-anchor="middle" class="caption">质量评估与数据飞轮闭环</text>
<g><rect x="60" y="110" width="190" height="82" rx="13" fill="#eff6ff" stroke="#334155" stroke-width="1.3"/><text x="155.0" y="140" text-anchor="middle" class="title">自动校验</text><text x="155.0" y="168" text-anchor="middle" class="item">schema / 时长 / 采样率</text></g>
<g><rect x="300" y="110" width="190" height="82" rx="13" fill="#f0fdf4" stroke="#334155" stroke-width="1.3"/><text x="395.0" y="140" text-anchor="middle" class="title">反向 ASR</text><text x="395.0" y="168" text-anchor="middle" class="item">文本一致性 / CER</text></g>
<g><rect x="540" y="110" width="190" height="82" rx="13" fill="#fff7ed" stroke="#334155" stroke-width="1.3"/><text x="635.0" y="140" text-anchor="middle" class="title">风格评估</text><text x="635.0" y="168" text-anchor="middle" class="item">speaker / emotion</text></g>
<g><rect x="780" y="110" width="190" height="82" rx="13" fill="#fdf2f8" stroke="#334155" stroke-width="1.3"/><text x="875.0" y="140" text-anchor="middle" class="title">人工抽检</text><text x="875.0" y="168" text-anchor="middle" class="item">自然度 / 滥用风险</text></g>
<g><rect x="415" y="270" width="290" height="82" rx="13" fill="#f8fafc" stroke="#334155" stroke-width="1.3"/><text x="560.0" y="300" text-anchor="middle" class="title">数据修复与版本切分</text><text x="560.0" y="328" text-anchor="middle" class="item">重合成、重标注、降权或剔除</text></g>
<line x1="250" y1="151" x2="300" y2="151" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><line x1="490" y1="151" x2="540" y2="151" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><line x1="730" y1="151" x2="780" y2="151" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><line x1="875" y1="192" x2="705" y2="270" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><text x="790.0" y="223.0" text-anchor="middle" class="item">问题样本</text><line x1="415" y1="311" x2="250" y2="160" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><text x="332.5" y="227.5" text-anchor="middle" class="item">规则更新</text>
<text x="560" y="395" text-anchor="middle" class="item">线上反馈进入复评队列，只有通过语义、风格、音质与安全门禁的样本才进入下一版训练集。</text>
</svg>
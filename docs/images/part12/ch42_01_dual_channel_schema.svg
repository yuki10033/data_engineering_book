<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#475569"/></marker>
  <style>.title{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:20px;font-weight:700;fill:#0f172a}.item{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:16px;fill:#334155}.caption{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;fill:#0f172a}</style>
</defs>
<rect x="1" y="1" width="1278" height="558" rx="18" fill="white" stroke="#cbd5e1"/>
<text x="640" y="38" text-anchor="middle" class="caption">语义响应与风格控制双通道 schema</text>
<g><rect x="60" y="90" width="330" height="170" rx="14" fill="#eff6ff" stroke="#334155" stroke-width="1.3"/><text x="78" y="120" class="title">语义通道 Semantic Channel</text><text x="82" y="148" class="item">• query / spoken user query</text><text x="82" y="174" class="item">• answer / assistant response</text><text x="82" y="200" class="item">• task：S2S 或 TTS</text><text x="82" y="226" class="item">• language：zh</text></g>
<g><rect x="60" y="310" width="330" height="170" rx="14" fill="#f0fdf4" stroke="#334155" stroke-width="1.3"/><text x="78" y="340" class="title">风格通道 Style Channel</text><text x="82" y="368" class="item">• query_gender / answer_gender</text><text x="82" y="394" class="item">• query_mood / answer_mood</text><text x="82" y="420" class="item">• gender / mood</text><text x="82" y="446" class="item">• query_id / answer_id</text></g>
<g><rect x="480" y="120" width="320" height="230" rx="14" fill="#fff7ed" stroke="#334155" stroke-width="1.3"/><text x="498" y="150" class="title">声学监督 Acoustic Target</text><text x="502" y="178" class="item">• query_audio_path / answer_audio_path</text><text x="502" y="204" class="item">• query_token_25hz</text><text x="502" y="230" class="item">• answer_token_25hz</text><text x="502" y="256" class="item">• speech_token_25hz</text><text x="502" y="282" class="item">• sample_rate：16000</text></g>
<g><rect x="900" y="165" width="310" height="200" rx="14" fill="#fdf2f8" stroke="#334155" stroke-width="1.3"/><text x="918" y="195" class="title">训练样本 Training Record</text><text x="922" y="223" class="item">• 文本损失：语义一致性</text><text x="922" y="249" class="item">• 语音 token 损失：可发音性</text><text x="922" y="275" class="item">• 说话人约束：身份一致</text><text x="922" y="301" class="item">• 情绪约束：风格准确</text></g>
<line x1="390" y1="175" x2="480" y2="200" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><text x="435.0" y="177.5" text-anchor="middle" class="item">文本对齐</text>
<line x1="390" y1="395" x2="480" y2="280" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><text x="435.0" y="327.5" text-anchor="middle" class="item">条件控制</text>
<line x1="800" y1="235" x2="900" y2="255" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/><text x="850.0" y="235.0" text-anchor="middle" class="item">统一封装</text>
<text x="640" y="515" text-anchor="middle" class="item">核心原则：语义是否正确与声音如何表达分开建模，在样本层再合并为可训练记录。</text>
</svg>

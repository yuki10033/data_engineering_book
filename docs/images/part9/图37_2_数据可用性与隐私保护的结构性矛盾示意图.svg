     id="circle23" />
  <g
     font-family="Arial, Helvetica, sans-serif"
     font-size="15"
     font-weight="700"
     id="g25">
    <text
       x="95"
       y="462"
       fill="#a52d3f"
       id="text23">More protection</text>
    <text
       x="700"
       y="462"
       text-anchor="middle"
       fill="#6f602a"
       id="text24">Task-specific operating point</text>
    <text
       x="1305"
       y="462"
       text-anchor="end"
       fill="#18769f"
       id="text25">More utility</text>
  </g>
  <!-- Consequences -->
  <rect
     x="55"
     y="500"
     width="390"
     height="150"
     rx="8"
     fill="#f8fafb"
     stroke="#d8e0e4"
     stroke-width="2"
     id="rect25" />
  <rect
     x="505"
     y="500"
     width="390"

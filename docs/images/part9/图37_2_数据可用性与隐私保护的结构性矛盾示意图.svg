  <title
     id="title">Trade-off Between Data Utility and Privacy Protection</title>
  <desc
     id="desc">A horizontal spectrum contrasts extreme privacy and extreme utility, with a minimum necessary exposure surface at the center.</desc>
  <rect
     width="1400"
     height="760"
     fill="#ffffff"
     id="rect1" />
  <text
     x="700"
     y="50"
     text-anchor="middle"
     font-family="Arial, Helvetica, sans-serif"
     font-size="36"
     font-weight="700"
     fill="#17202a"
     id="text1">Trade-off Between Data Utility and Privacy Protection</text>
  <text
     x="700"
     y="82"
     text-anchor="middle"
     font-family="Arial, Helvetica, sans-serif"
     font-size="17"
     fill="#5b6873"
     id="text2">Architecture must preserve enough information for the task while minimizing unnecessary exposure.</text>
  <!-- Three operating regions -->
  <rect
     x="55"
     y="130"
     width="390"
     height="220"
     rx="8"
     fill="#fbeded"
     stroke="#c94b4b"
     stroke-width="3"
     id="rect2" />
  <rect
     x="505"
     y="112"
     width="390"
     height="256"
     rx="8"
     fill="#f4f4e8"
     stroke="#ad9852"
     stroke-width="3"
     id="rect3" />
  <rect
     x="955"
     y="130"
     width="390"
     height="220"
     rx="8"
     fill="#eaf4f8"
     stroke="#2b7fa9"
     stroke-width="3"
     id="rect4" />
  <g
     font-family="Arial, Helvetica, sans-serif"
     id="g19">
    <text
       x="250"
       y="172"
       text-anchor="middle"
       font-size="27"
       font-weight="700"
       fill="#a52d3f"
       id="text4">Extreme Privacy</text>
    <text
       x="250"
       y="212"
       text-anchor="middle"
       font-size="17"
       fill="#17202a"
       id="text5">Data isolation and minimal sharing</text>
    <text
       x="92"
       y="252"
       font-size="16"
       fill="#374151"
       id="text6">• Heavy noise or aggressive masking</text>
    <text
       x="92"
       y="284"
       font-size="16"
       fill="#374151"
       id="text7">• Restricted queries and outputs</text>
    <text
       x="92"
       y="316"
       font-size="16"
       fill="#374151"
       id="text8">• Very limited collaboration signals</text>
    <text
       x="700"
       y="158"
       text-anchor="middle"
       font-size="27"
       font-weight="700"
       fill="#6f602a"
       id="text9">Optimal Trade-off Zone</text>
    <text
       x="716.34778"
       y="194.89915"
       text-anchor="middle"
       font-size="20.5673px"
       font-weight="700"
       fill="#17202a"
       id="text10"
       transform="scale(0.97939269,1.0210409)"
       style="stroke-width:1">Minimum Necessary Exposure Surface</text>
    <text
       x="542"
       y="239"
       font-size="16"
       fill="#374151"
       id="text11">• Limited data visibility</text>
    <text
       x="542"
       y="271"
       font-size="16"
       fill="#374151"
       id="text12">• Controlled information exchange</text>
    <text
       x="542"
       y="303"
       font-size="16"
       fill="#374151"
       id="text13">• Minimal intermediate storage</text>
    <text
       x="542"
       y="335"
       font-size="16"
       fill="#374151"
       id="text14">• Restricted model and output exposure</text>
    <text
       x="1150"
       y="172"
       text-anchor="middle"
       font-size="27"
       font-weight="700"
       fill="#18769f"
       id="text15">Extreme Utility</text>
    <text
       x="1150"
       y="212"
       text-anchor="middle"
       font-size="17"
       fill="#17202a"
       id="text16">Broad access and unrestricted sharing</text>
    <text
       x="992"
       y="252"
       font-size="16"
       fill="#374151"
       id="text17">• Plaintext or full-data exchange</text>
    <text
       x="992"
       y="284"
       font-size="16"
       fill="#374151"
       id="text18">• Unrestricted joint modeling</text>
    <text
       x="992"
       y="316"
       font-size="16"
       fill="#374151"
       id="text19">• Extensive reuse of intermediate results</text>
  </g>
  <!-- Continuous trade-off axis -->
  <line

     id="rect26" />
  <rect
     x="955"
     y="500"
     width="390"
     height="150"
     rx="8"
     fill="#f8fafb"
     stroke="#d8e0e4"
     stroke-width="2"
     id="rect27" />
  <g
     font-family="Arial, Helvetica, sans-serif"
     id="g35">
    <text
       x="250"
       y="535"
       text-anchor="middle"
       font-size="20"
       font-weight="700"
       fill="#a52d3f"
       id="text27">Cost of excessive protection</text>
    <text
       x="84"
       y="575"
       font-size="16"
       fill="#374151"
       id="text28">• Lower model accuracy and recall</text>
    <text
       x="84"
       y="607"
       font-size="16"
       fill="#374151"
       id="text29">• Poor usability and weak collaboration</text>
    <text
       x="700"
       y="535"
       text-anchor="middle"
       font-size="20"
       font-weight="700"
       fill="#6f602a"
       id="text30">Engineering objective</text>
    <text
       x="535"
       y="575"
       font-size="16"
       fill="#374151"
       id="text31">• Expose only information required by the task</text>
    <text
       x="564.20941"
       y="575.66742"
       font-size="15.1741px"
       fill="#374151"
       id="text32"
       transform="scale(0.94838125,1.0544283)"
       style="stroke-width:1">• Verify privacy, performance, and governance together</text>
    <text
       x="1150"
       y="535"
       text-anchor="middle"
       font-size="20"
       font-weight="700"
       fill="#18769f"
       id="text33">Cost of excessive exposure</text>
    <text
       x="984"
       y="575"
       font-size="16"
       fill="#374151"
       id="text34">• Higher privacy and linkage risk</text>
    <text
       x="984"
       y="607"
       font-size="16"
       fill="#374151"
       id="text35">• Greater compliance and audit pressure</text>
  </g>
  <rect
     x="265"
     y="686"
     width="870"
     height="35"
     rx="5"
     fill="#e8f1f5"
     id="rect35" />
  <text
     x="700"
     y="709"
     text-anchor="middle"
     font-family="Arial, Helvetica, sans-serif"
     font-size="16"
     font-weight="700"
     fill="#173f59"
     id="text36">The correct operating point depends on task value, data sensitivity, attack surface, and regulatory constraints.</text>
</svg>

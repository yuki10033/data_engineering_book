  <title
     id="title">Shift from Data Security to Training Security in AI Systems</title>
  <desc
     id="desc">Traditional data security focuses on databases, access, and exports. AI systems add risks across training, aggregation, evaluation, and inference, requiring process-level protections.</desc>

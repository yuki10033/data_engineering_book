<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#2b6f99"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#43846f"/>
    </marker>
  </defs>

  <rect width="1400" height="840" fill="#ffffff"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#17202a">
    <text x="700" y="48" text-anchor="middle" font-size="34" font-weight="700">Federated Learning Training Loop</text>
    <text x="700" y="78" text-anchor="middle" font-size="16" fill="#5b6975">Round-based collaborative optimization without centralizing raw data</text>

    <!-- Outer round loop -->
    <path d="M188 687C91 607 91 278 197 187C304 95 1062 92 1194 181C1305 256 1319 602 1210 692C1091 789 316 787 188 687Z"
          fill="none" stroke="#91afc1" stroke-width="9" marker-end="url(#arrow-blue)"/>
    <rect x="565" y="765" width="270" height="38" fill="#ffffff"/>
    <text x="700" y="791" text-anchor="middle" font-size="17" font-weight="700" fill="#2b6f99">NEXT ROUND  t → t + 1</text>

    <!-- Coordinator -->
    <rect x="435" y="116" width="530" height="246" fill="#eaf2f6" stroke="#2b6f99" stroke-width="3"/>
    <rect x="435" y="116" width="530" height="47" fill="#2b6f99"/>
    <text x="700" y="147" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">CENTRAL COORDINATOR</text>

    <rect x="475" y="187" width="175" height="70" fill="#ffffff" stroke="#7f9eaf" stroke-width="2"/>
    <text x="562" y="216" text-anchor="middle" font-size="16" font-weight="700">Global model</text>
    <text x="562" y="240" text-anchor="middle" font-size="15" fill="#536571">round t</text>

    <path d="M660 222H730" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <rect x="750" y="187" width="175" height="70" fill="#ffffff" stroke="#7f9eaf" stroke-width="2"/>
    <text x="837" y="216" text-anchor="middle" font-size="16" font-weight="700">New global model</text>
    <text x="837" y="240" text-anchor="middle" font-size="15" fill="#536571">round t + 1</text>

    <rect x="475" y="278" width="450" height="57" fill="#dce9ef" stroke="#7f9eaf" stroke-width="1.5"/>
    <text x="700" y="302" text-anchor="middle" font-size="16" font-weight="700">Aggregation module</text>
    <text x="700" y="324" text-anchor="middle" font-size="14" fill="#536571">FedAvg · weighted averaging · robust or secure aggregation</text>

    <!-- Client A -->
    <rect x="70" y="206" width="300" height="180" fill="#f1f6f8" stroke="#5683a0" stroke-width="2.5"/>
    <rect x="70" y="206" width="300" height="40" fill="#dceaf1"/>
    <text x="220" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#214b64">HOSPITAL A</text>
    <g transform="translate(96 270)" stroke="#2b6f99" stroke-width="2" fill="none">
      <ellipse cx="35" cy="8" rx="27" ry="8" fill="#d7e8f0"/>
      <path d="M8 8V55C8 66 62 66 62 55V8M8 31C8 42 62 42 62 31M8 55C8 66 62 66 62 55"/>
    </g>
    <text x="131" y="351" text-anchor="middle" font-size="14" font-weight="700">Local dataset</text>
    <rect x="192" y="271" width="145" height="75" fill="#e8f1e6" stroke="#688861" stroke-width="2"/>
    <text x="264" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#496344">Local training</text>
    <text x="264" y="323" text-anchor="middle" font-size="14" fill="#536571">several steps</text>
    <text x="220" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#2f755f">RAW DATA STAYS LOCAL</text>

    <!-- Client B -->
    <rect x="70" y="493" width="300" height="180" fill="#f1f6f8" stroke="#5683a0" stroke-width="2.5"/>
    <rect x="70" y="493" width="300" height="40" fill="#dceaf1"/>
    <text x="220" y="519" text-anchor="middle" font-size="17" font-weight="700" fill="#214b64">ORGANIZATION B</text>
    <g transform="translate(96 557)" stroke="#2b6f99" stroke-width="2" fill="none">
      <ellipse cx="35" cy="8" rx="27" ry="8" fill="#d7e8f0"/>
      <path d="M8 8V55C8 66 62 66 62 55V8M8 31C8 42 62 42 62 31M8 55C8 66 62 66 62 55"/>
    </g>
    <text x="131" y="638" text-anchor="middle" font-size="14" font-weight="700">Local dataset</text>
    <rect x="192" y="558" width="145" height="75" fill="#e8f1e6" stroke="#688861" stroke-width="2"/>
    <text x="264" y="587" text-anchor="middle" font-size="15" font-weight="700" fill="#496344">Local training</text>
    <text x="264" y="610" text-anchor="middle" font-size="14" fill="#536571">several steps</text>
    <text x="220" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#2f755f">RAW DATA STAYS LOCAL</text>

    <!-- Client C -->
    <rect x="1030" y="206" width="300" height="180" fill="#f1f6f8" stroke="#5683a0" stroke-width="2.5"/>
    <rect x="1030" y="206" width="300" height="40" fill="#dceaf1"/>
    <text x="1180" y="232" text-anchor="middle" font-size="17" font-weight="700" fill="#214b64">EDGE NODE C</text>
    <rect x="1063" y="271" width="145" height="75" fill="#e8f1e6" stroke="#688861" stroke-width="2"/>
    <text x="1135" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#496344">Local training</text>
    <text x="1135" y="323" text-anchor="middle" font-size="14" fill="#536571">several steps</text>
    <g transform="translate(1234 270)" stroke="#2b6f99" stroke-width="2" fill="none">
      <ellipse cx="35" cy="8" rx="27" ry="8" fill="#d7e8f0"/>
      <path d="M8 8V55C8 66 62 66 62 55V8M8 31C8 42 62 42 62 31M8 55C8 66 62 66 62 55"/>
    </g>
    <text x="1269" y="351" text-anchor="middle" font-size="14" font-weight="700">Local dataset</text>
    <text x="1180" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#2f755f">RAW DATA STAYS LOCAL</text>

    <!-- Client D -->
    <rect x="1030" y="493" width="300" height="180" fill="#f1f6f8" stroke="#5683a0" stroke-width="2.5"/>
    <rect x="1030" y="493" width="300" height="40" fill="#dceaf1"/>
    <text x="1180" y="519" text-anchor="middle" font-size="17" font-weight="700" fill="#214b64">EDGE NODE D</text>
    <rect x="1063" y="558" width="145" height="75" fill="#e8f1e6" stroke="#688861" stroke-width="2"/>
    <text x="1135" y="587" text-anchor="middle" font-size="15" font-weight="700" fill="#496344">Local training</text>
    <text x="1135" y="610" text-anchor="middle" font-size="14" fill="#536571">several steps</text>
    <g transform="translate(1234 557)" stroke="#2b6f99" stroke-width="2" fill="none">
      <ellipse cx="35" cy="8" rx="27" ry="8" fill="#d7e8f0"/>
      <path d="M8 8V55C8 66 62 66 62 55V8M8 31C8 42 62 42 62 31M8 55C8 66 62 66 62 55"/>
    </g>
    <text x="1269" y="638" text-anchor="middle" font-size="14" font-weight="700">Local dataset</text>
    <text x="1180" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="#2f755f">RAW DATA STAYS LOCAL</text>

    <!-- Download paths -->
    <path d="M475 250C423 275 408 285 370 291" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <path d="M508 335C448 401 421 510 370 559" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <path d="M925 250C977 275 992 285 1030 291" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <path d="M892 335C952 401 979 510 1030 559" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>

    <!-- Upload paths -->
    <path d="M370 321C420 329 439 321 475 301" fill="none" stroke="#43846f" stroke-width="4" marker-end="url(#arrow-green)"/>
    <path d="M370 607C430 548 456 431 527 335" fill="none" stroke="#43846f" stroke-width="4" marker-end="url(#arrow-green)"/>
    <path d="M1030 321C980 329 961 321 925 301" fill="none" stroke="#43846f" stroke-width="4" marker-end="url(#arrow-green)"/>
    <path d="M1030 607C970 548 944 431 873 335" fill="none" stroke="#43846f" stroke-width="4" marker-end="url(#arrow-green)"/>

    <!-- Arrow legend -->
    <rect x="455" y="390" width="490" height="123" fill="#ffffff" stroke="#9caeb8" stroke-width="1.5"/>
    <path d="M491 420H570" fill="none" stroke="#2b6f99" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <text x="590" y="426" font-size="15" font-weight="700" fill="#214b64">Global model is distributed to selected clients</text>
    <path d="M491 458H570" fill="none" stroke="#43846f" stroke-width="4" marker-end="url(#arrow-green)"/>
    <text x="590" y="464" font-size="15" font-weight="700" fill="#2f755f">Only gradients or parameter updates return</text>
    <text x="700" y="495" text-anchor="middle" font-size="14" fill="#536571">The coordinator aggregates updates; it does not receive local training records.</text>

    <!-- FedAvg formula -->
    <rect x="475" y="544" width="450" height="76" fill="#eef4f6" stroke="#7f9eaf" stroke-width="1.5"/>
    <text x="700" y="572" text-anchor="middle" font-size="15" font-weight="700" fill="#214b64">Weighted aggregation</text>
    <text x="700" y="603" text-anchor="middle" font-family="Times New Roman, serif" font-size="22">w<tspan baseline-shift="sub" font-size="15">t+1</tspan> = Σ<tspan baseline-shift="sub" font-size="15">k</tspan> (n<tspan baseline-shift="sub" font-size="15">k</tspan> / n) w<tspan baseline-shift="sub" font-size="15">t+1</tspan><tspan baseline-shift="sub" font-size="15">,k</tspan></text>

    <!-- Constraints -->
    <rect x="475" y="642" width="450" height="94" fill="#fbf1ed" stroke="#bd6950" stroke-width="2"/>
    <text x="700" y="669" text-anchor="middle" font-size="16" font-weight="700" fill="#994b38">FEDERATED ASSUMPTIONS</text>
    <text x="500" y="697" font-size="14">Independent participants · limited trust · non-IID data</text>
    <text x="500" y="720" font-size="14">Different compute, bandwidth, availability, and local sample sizes</text>
  </g>
</svg>

    <path d="M0 467 C199 412 330 403 513 455 C727 516 914 568 1090 501 C1247 441 1397 424 1536 469" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M0 615 C168 559 301 549 459 585 C607 619 722 702 894 663 C1054 626 1148 516 1309 548 C1405 567 1477 626 1536 656" fill="none" stroke="#b7d9f4" stroke-width="1"/>

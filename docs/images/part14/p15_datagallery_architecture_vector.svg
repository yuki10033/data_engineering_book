<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">DataGallery Ecosystem Architecture for DataAgent</title>
  <desc id="desc">Architecture diagram showing DataGallery Core on the left, Data-Studio and Data-Ops on the right, and foundation layers for models, data infrastructure, and hardware at the bottom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf9ff"/>
      <stop offset="0.48" stop-color="#f7fcff"/>
      <stop offset="1" stop-color="#dff3ff"/>
    </linearGradient>

    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.47"/>
    </linearGradient>

    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="cyanIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35d6d1"/>
      <stop offset="1" stop-color="#0fadd0"/>
    </linearGradient>
    <linearGradient id="orangeIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9f2d"/>
      <stop offset="1" stop-color="#ff7e22"/>
    </linearGradient>
    <linearGradient id="purpleIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b186ee"/>
      <stop offset="1" stop-color="#7c55d8"/>
    </linearGradient>
    <linearGradient id="blueIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4aa1ff"/>
      <stop offset="1" stop-color="#1762de"/>
    </linearGradient>
    <linearGradient id="roseIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a9d"/>
      <stop offset="1" stop-color="#ef5575"/>
    </linearGradient>
    <linearGradient id="tealIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d7c5"/>
      <stop offset="1" stop-color="#09a997"/>
    </linearGradient>
    <linearGradient id="chipIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7eb4ef"/>
      <stop offset="1" stop-color="#5485c9"/>
    </linearGradient>

    <filter id="softShadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94b7dc" flood-opacity="0.16"/>
    </filter>
    <filter id="tinyShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#7da7ce" flood-opacity="0.18"/>
    </filter>

    <style>
      .title {
        font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 29px;
        line-height: 1;
        font-weight: 720;
        fill: #07080b;
        letter-spacing: 0;
      }
      .section-title {
        font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 24px;
        font-weight: 720;
        fill: #07080b;
        letter-spacing: 0;
      }
      .group-title {
        font-family: "Inter", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 20px;
        font-weight: 690;
        fill: #07080b;
        letter-spacing: 0;
      }
      .label {
        font-family: "Inter", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 17px;
        font-weight: 440;
        fill: #0a0b0f;
        letter-spacing: 0;
      }
      .bottom-label {
        font-family: "Inter", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 20px;
        font-weight: 520;
        fill: #0a0b0f;
        letter-spacing: 0;
      }
      .panel {
        fill: url(#panelFill);
        stroke: #b8d8f6;
        stroke-width: 1.05;
      }
      .card {
        fill: url(#cardFill);
        stroke: #b9d7f4;
        stroke-width: 1.05;
      }
      .pill,
      .group-box {
        fill: rgba(255,255,255,0.5);
        stroke: #bdd7f2;
        stroke-width: 1.05;
      }
      .line-art {
        fill: none;
        stroke: #ffffff;
        stroke-width: 2.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .line-art-thin {
        fill: none;
        stroke: #ffffff;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .white-fill {
        fill: #ffffff;
      }
      .label-mask {
        fill: #ffffff;
      }
    </style>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>

